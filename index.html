<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Giraffa Runner CLEAR</title>

<style>
body{margin:0;overflow:hidden;background:#87CEEB;font-family:Courier}
canvas{display:block}

#ui{
position:absolute;top:10px;left:10px;
color:white;font-size:18px;
text-shadow:2px 2px black;
}

#start{
position:absolute;inset:0;
display:flex;flex-direction:column;
align-items:center;justify-content:center;
background:rgba(0,0,0,0.85);
color:white;
}

button{padding:15px 25px;font-size:18px}

</style>
</head>

<body>

<canvas id="c"></canvas>

<div id="ui">TIME: <span id="t">120</span></div>

<div id="start">
<h1>🦒 GIRAFFA RUNNER</h1>
<button onclick="startGame()">START</button>
<p>⬆ salta le rocce | passa sotto i rami automaticamente</p>
</div>

<script>

const c=document.getElementById("c");
const ctx=c.getContext("2d");
c.width=800;c.height=400;

// AUDIO
let audioCtx;

function beep(f,d,type="square"){
if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)();

let o=audioCtx.createOscillator();
let g=audioCtx.createGain();

o.type=type;
o.frequency.value=f;

g.gain.setValueAtTime(0.2,audioCtx.currentTime);
g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+d);

o.connect(g);
g.connect(audioCtx.destination);

o.start();
o.stop(audioCtx.currentTime+d);
}

function jumpSound(){beep(600,0.1)}
function hitSound(){beep(120,0.3,"sawtooth")}
function winSound(){beep(800,0.2);setTimeout(()=>beep(1000,0.2),150)}

let keys={};

let world={
scroll:0,time:120,started:false,gameOver:false,win:false
};

let g={
x:200,y:280,w:45,h:60,
vy:0,onGround:false
};

let platforms=[];
let obstacles=[];

function generate(){

platforms=[];
obstacles=[];

platforms.push({x:0,y:340,w:3000,h:60});

for(let i=0;i<30;i++){

let x=i*120;

// ROCCE (DA SALTARE)
if(Math.random()<0.5){
obstacles.push({x:x+40,y:300,w:40,h:40,type:"rock"});
}

// RAMI (ALTI → devi essere a terra quando passi)
if(Math.random()<0.4){
obstacles.push({x:x+10,y:250,w:90,h:15,type:"branch"});
}

}

}

function drawRect(x,y,w,h,c){
ctx.fillStyle=c;
ctx.fillRect(x,y,w,h);
}

function drawG(){

let sx=g.x-world.scroll;

// giraffa semplice ma leggibile
drawRect(sx,g.y,g.w,g.h,"#FFD54F");
drawRect(sx+15,g.y-40,10,40,"#FFD54F");
drawRect(sx+10,g.y-55,25,15,"#FFD54F");
drawRect(sx+18,g.y-52,4,4,"black");
}

function startGame(){
document.getElementById("start").style.display="none";
world.started=true;
generate();
loop();
}

function update(){

if(!world.started) return;

world.time-=1/60;
if(world.time<=0){world.gameOver=true;hitSound();}

if(keys["ArrowRight"]) g.x+=4;
if(keys["ArrowLeft"]) g.x-=3;

// salto
if(keys["ArrowUp"] && g.onGround){
g.vy=-12;
g.onGround=false;
jumpSound();
}

g.vy+=0.6;
g.y+=g.vy;

let gh=60;

// piattaforma
g.onGround=false;

for(let p of platforms){

if(
g.x < p.x+p.w &&
g.x+g.w > p.x &&
g.y+gh >= p.y &&
g.y+gh <= p.y+15 &&
g.vy>=0
){
g.y=p.y-gh;
g.vy=0;
g.onGround=true;
}

}

// camera
world.scroll=g.x-200;
if(world.scroll<0) world.scroll=0;

// collisioni
for(let o of obstacles){

let hit=
g.x < o.x+o.w &&
g.x+g.w > o.x &&
g.y < o.y+o.h &&
g.y+gh > o.y;

if(hit){

if(o.type==="rock"){
world.gameOver=true;
hitSound();
}

if(o.type==="branch"){
world.gameOver=true;
hitSound();
}

}

}

if(g.y>500){
world.gameOver=true;
hitSound();
}

}

function draw(){

ctx.clearRect(0,0,800,400);

drawRect(0,0,800,400,"#87CEEB");
drawRect(0,340,800,60,"#8B4513");

// piattaforma
for(let p of platforms){
drawRect(p.x-world.scroll,p.y,p.w,p.h,"#228B22");
}

// ostacoli
for(let o of obstacles){
let x=o.x-world.scroll;
drawRect(x,o.y,o.w,o.h,o.type==="rock"?"gray":"brown");
}

// giraffa
drawG();

// UI
document.getElementById("t").innerText=Math.floor(world.time);

// GAME OVER
if(world.gameOver){
ctx.fillStyle="rgba(0,0,0,0.7)";
ctx.fillRect(0,0,800,400);

ctx.fillStyle="white";
ctx.font="40px Arial";
ctx.fillText("GAME OVER",250,200);
}
}

function loop(){
update();
draw();
requestAnimationFrame(loop);
}

window.addEventListener("keydown",e=>keys[e.key]=true);
window.addEventListener("keyup",e=>keys[e.key]=false);

</script>
</body>
</html>
